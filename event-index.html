<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000;
    }
   #iframe-container {
    width: 100%;
    min-height: 600px;
  }
  #usefullIframe {
    width: 100%;
    border: none;
    overflow: hidden;
    display: block;
  }
  </style>
</head>

<body>
  <div id="iframe-container">
  <iframe
    id="usefullIframe"
    src="https://usefull.com.au/version-13elp/event-widget/june"
    frameborder="0"
    style="width:100%;border:0;overflow:hidden;display:block;"
    scrolling="no"
    allow="payment"
    sandbox="allow-forms allow-scripts allow-payment allow-popups allow-top-navigation-by-user-activation allow-same-origin">
  </iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.5/iframeResizer.min.js"></script>

<script>
  iFrameResize({
    checkOrigin: true,
    heightCalculationMethod: "bodyScroll",
    onMessage: function (messageData) {
      if (!messageData || messageData.message !== "usefull:scroll-top") return;
      document.getElementById("iframe-container").scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }, "#usefullIframe");
</script>
</body>
</html>
